<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLE Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    @media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #eee; } .card { background: #2a2a2a; border-color: #3a3a3a; } }
    .wrap { width: 100%; max-width: 520px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem 1.5rem; }
    .label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .metric { font-size: 40px; font-weight: 500; line-height: 1; }
    .unit { font-size: 18px; color: #888; margin-left: 4px; }
    .footer { display: flex; justify-content: space-between; align-items: center; }
    .status-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #639922; }
    .status-text { font-size: 13px; color: #888; }
    .warn { background: #fef3cd; color: #856404; font-size: 12px; padding: 3px 10px; border-radius: 6px; display: none; }
    .ts { font-size: 13px; color: #888; }
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .grid { grid-template-columns: 1fr; gap: 8px; margin-bottom: 8px; }
      .card { padding: 1rem; }
      .metric { font-size: 32px; }
      .footer { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="card">
        <div class="label">Temperature</div>
        <div class="metric"><span id="temp">—</span><span class="unit">°C</span></div>
      </div>
      <div class="card">
        <div class="label">Humidity</div>
        <div class="metric"><span id="hum">—</span><span class="unit">%</span></div>
      </div>
      <div class="card">
        <div class="label">Signal</div>
        <div class="metric"><span id="rssi">—</span><span class="unit">dBm</span></div>
      </div>
    </div>
    <div class="card footer">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span class="status-text" id="status">Loading...</span>
      </div>
      <span class="warn" id="warn">Stale data</span>
      <span class="ts" id="ts"></span>
    </div>
  </div>
  <script>
    async function load() {
      try {
        const r = await fetch('status.json?t=' + Date.now(), { cache: 'no-store' });
        const d = await r.json();
        document.getElementById('temp').textContent = d.temperature_c.toFixed(1);
        document.getElementById('hum').textContent = d.humidity_pct.toFixed(1);
        document.getElementById('rssi').textContent = d.rssi;
        const ts = new Date(d.timestamp);
        const age = (Date.now() - ts) / 60000;
        document.getElementById('ts').textContent = ts.toLocaleString();
        const stale = age > 10;
        document.getElementById('dot').style.background = stale ? '#BA7517' : '#639922';
        document.getElementById('status').textContent = stale ? 'Last seen ' + Math.round(age) + 'm ago' : 'Live';
        document.getElementById('warn').style.display = stale ? 'inline-block' : 'none';
      } catch(e) {
        document.getElementById('status').textContent = 'No data';
        document.getElementById('dot').style.background = '#E24B4A';
      }
    }
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
